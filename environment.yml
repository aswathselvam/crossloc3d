name: crossloc
channels:
  - pytorch
  - nvidia
  - conda-forge
  - anaconda
  - defaults
dependencies:
  - python=3.7
  - pandas
  - tensorboard
  - numpy
  - openblas-devel
  - openexr
  - openexr-python
  - pytorch=1.13.1
  - torchvision
  - pytorch-cuda=11.7
  - pip
  - pip:
      - laspy
      - pytest
      - addict
      - pytorch-metric-learning==0.9.97
      - yapf==0.40.1
      - bitarray>=1.6.0
      - h5py
      - transforms3d
      - open3d
      - tqdm
      - setuptools==59.5.0
      - einops
      - bagpy
      - utm
      - pptk
      - pyexr
      - pyntcloud
